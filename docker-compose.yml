services:
  postgres:
    image: postgres:16-alpine
    container_name: a360-news-review-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: a360
      POSTGRES_PASSWORD: a360_dev_password
      POSTGRES_DB: news_review
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a360 -d news_review"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
